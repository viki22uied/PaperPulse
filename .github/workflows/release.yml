name: Publish to PyPI

# Publishes the package to PyPI whenever you cut a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) -- no API token stored in the repo.
# One-time setup: on PyPI, add a trusted publisher for project "paperpulse"
#   owner: viki22uied, repo: PaperPulse, workflow: release.yml, environment: pypi
# See https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
