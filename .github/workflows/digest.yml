name: Daily digest

# Scheduled arXiv digest. Runs every weekday morning, commits the new digest,
# and (optionally) emails it. Enable by adding repository secrets for whichever
# delivery channel you want.
on:
  schedule:
    - cron: "0 7 * * 1-5"  # 07:00 UTC, Mon-Fri
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[semantic]"
      - name: Generate digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PAPERPULSE_SMTP_HOST: ${{ secrets.PAPERPULSE_SMTP_HOST }}
          PAPERPULSE_SMTP_USER: ${{ secrets.PAPERPULSE_SMTP_USER }}
          PAPERPULSE_SMTP_PASSWORD: ${{ secrets.PAPERPULSE_SMTP_PASSWORD }}
        run: paperpulse run
      - name: Commit digest
        run: |
          git config user.name "paperpulse-bot"
          git config user.email "paperpulse-bot@users.noreply.github.com"
          git add digests/ .paperpulse_state.json || true
          git commit -m "Add digest for $(date -u +%Y-%m-%d)" || echo "no changes"
          git push || true
