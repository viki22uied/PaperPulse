# PaperPulse configuration.
# Copy to `paperpulse.yaml` and edit, or run `paperpulse init`.

# arXiv categories to pull from. Wildcards work, e.g. "q-fin.*".
# Browse the taxonomy at https://arxiv.org/category_taxonomy
categories:
  - cs.LG
  - cs.CL

# Quant equity research preset: uncomment to pull from the categories that
# actually carry factor/portfolio methodology papers, rather than just
# cs.LG/cs.CL.
# categories:
#   - q-fin.PM   # portfolio management
#   - q-fin.ST   # statistical finance
#   - q-fin.TR   # trading and market microstructure
#   - q-fin.RM   # risk management
#   - econ.EM    # econometrics
#   - econ.GN    # general economics
#   - stat.AP    # applied statistics (often has factor-model methodology)

# A short paragraph describing what you care about. This seeds the interest
# vector; feedback refines it from there.
interests: >
  Retrieval-augmented generation and dense retrieval for NLP, embedding models
  and their evaluation, and efficient fine-tuning of language models. Less
  interested in pure computer vision or reinforcement-learning theory.

# Optional: abstracts (or descriptions) of papers you already love, to give the
# profile a stronger start.
seed_papers: []

# Optional: factor/topic names to actively rank DOWN (e.g. things you've
# already worked on extensively). Unlike thumbs-down feedback, this applies
# from the very first run, before any Rocchio feedback has been given.
# Seed it from a file with `paperpulse init --seed-avoid factors.txt`.
avoid_topics: []
avoid_weight: 0.5   # how strongly avoid_topics pulls scores down

# How many recent papers to consider each run.
max_results: 200

# Ranking.
top_n: 5
diversity: 0.3        # 0 = pure relevance, 1 = maximise variety
min_score: 0.0        # drop papers below this cosine similarity
embedding_backend: auto   # auto | hashing | sentence-transformers

# Summaries. Extractive by default (offline, free). Set to true and provide
# OPENAI_API_KEY or ANTHROPIC_API_KEY for LLM three-bullet summaries.
use_llm: false
summary_sentences: 3

# Output.
output_dir: digests
state_path: .paperpulse_state.json

# Optional: restrict digests to papers tagged with these regions (USA / EUR /
# CHN / IND), based on keyword-detected market/index names. [] = no filter.
region_filter: []
region_filter_include_unspecified: true   # also keep papers with no detected region

# Optional: per-topic map of regions you've already tested yourself, keyed by
# the same topic name used in the known-topics log (see `topics_db` below).
# A paper on a logged topic in a region NOT listed here gets a green
# "untested region -- may still be worth exploring" note.
already_tested_regions: {}
#   board diversity: [USA]

# Optional: path to a shared SQLite log of known factor families (from the
# literature) and topics you've already tried yourself. When set, a fully
# offline `known_topic` trust signal flags papers that match an entry --
# 🔴 if logged dead/weak, 🟡 if it's just a known factor family worth a
# crowding check. Grow it with `paperpulse factors add "name" --aliases "a,b"
# --source literature|manual --result dead|weak|promising|untested`.
topics_db: ""
